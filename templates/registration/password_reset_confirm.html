{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Set a New Password{% endblock %}

{% block content %}
<main class="container">
  <div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 0.75rem;">
      <h2 class="card-title text-center mb-3">Set a new password</h2>
      <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-success w-100 mt-3">Change Password</button>
      </form>
      <div class="text-center mt-3">
        <small><a href="{% url 'login' %}">Back to Log In</a></small>
      </div>
    </div>
  </div>
</main>
{% endblock %}
