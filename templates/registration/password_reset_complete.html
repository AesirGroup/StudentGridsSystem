{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center mt-5">
  <div class="card shadow-sm p-4 text-center" style="width: 100%; max-width: 400px; border-radius: 0.75rem;">
    <h2 class="mb-3">Password reset complete</h2>
    <p class="text-muted mb-3">Your new password has been set.</p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100">Log In</a>
  </div>
</div>
{% endblock %}
