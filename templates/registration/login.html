{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center mt-5">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 0.75rem;">
    <h2 class="card-title text-center mb-4">Log In</h2>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary w-100 mt-3">Log In</button>
    </form>
    <div class="text-center mt-2">
      <small><a href="{% url 'password_reset' %}">Forgot your password?</a></small>
    </div>
    <div class="text-center mt-3">
      <small>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></small>
    </div>
  </div>
</div>
{% endblock %}
