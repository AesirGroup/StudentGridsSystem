{% extends "base.html" %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<main class="container">
  <div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card shadow-sm p-4 text-center" style="width: 100%; max-width: 400px; border-radius: 0.75rem;">
      <h2 class="mb-3">Check your inbox</h2>
      <p class="text-muted">We've emailed you instructions for setting your password. You should receive it shortly!</p>
      <a href="{% url 'login' %}" class="btn btn-primary mt-3 w-100">Back to Log In</a>
    </div>
  </div>
</main>
{% endblock %}
